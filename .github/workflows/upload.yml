name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      
      - name: Create output directory
        run: mkdir -p out

      - name: Zip Base Pack Content
        run: |
          cd base
          zip -r ../out/TNTActingPack.zip .
          
      - name: Zip Audio Pack Content
        run: |
          cd audio
          zip -r ../out/TNTActingAudio.zip .

      - name: Zip Data Pack Content
        run: |
          cd datapack
          zip -r ../out/TNTActingDatapack.zip .

      - name: Create SHA-1
        run: |
          sha1sum out/TNTActingPack.zip > out/TNTActingPack.zip.sha1
          sha1sum out/TNTActingAudio.zip > out/TNTActingAudio.zip.sha1
          sha1sum out/TNTActingDatapack.zip > out/TNTActingDatapack.zip.sha1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            out/*.zip
            out/*.sha1